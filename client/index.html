<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>LogisX — Logistics Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body class="dark-mode">
  <div id="app">
    <div id="app-loader" style="
      position:fixed;inset:0;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:#0f0f0f;gap:1rem;
    ">
      <svg width="40" height="40" viewBox="0 0 40 40" style="animation:spin 0.9s linear infinite">
        <circle cx="20" cy="20" r="16" fill="none" stroke="#1e293b" stroke-width="4"/>
        <circle cx="20" cy="20" r="16" fill="none" stroke="#34d399" stroke-width="4"
          stroke-dasharray="60 44" stroke-linecap="round"/>
      </svg>
      <span style="font-family:system-ui,sans-serif;font-size:0.78rem;color:#4b5563;letter-spacing:0.08em;text-transform:uppercase">Loading</span>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
